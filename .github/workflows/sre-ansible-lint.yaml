name: ansible-lint

on:
  pull_request:
    branches: ["main"]
    paths:
      - sre/*

jobs:
  lint:
    name: Lint sre/base.yaml
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run ansible-lint
        uses: ansible/ansible-lint@v25
        with:
          args: base.yaml
          working_directory: sre
          requirements_file: requirements.yaml
